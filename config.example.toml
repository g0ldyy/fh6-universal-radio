# Example config, copied to `<game>/fh6-radio/config.toml` on first install.
# Everything is editable from the dashboard; you only need to touch this file
# if you prefer hand edits. Windows paths should use TOML literal strings
# (single quotes) so backslashes pass through verbatim:
#
#   music_dir = 'C:\Users\you\Music'

[general]
port              = 8420
ring_buffer_mb    = 4
default_source    = "local_files"     # local_files | youtube_music | airplay
fallback_source   = "local_files"

[local_files]
enabled            = true
music_dir          = ''                # blank => set from the dashboard
recursive          = true
shuffle            = true
supported_formats  = ["mp3", "flac", "wav", "ogg", "m4a", "opus"]

[youtube_music]
enabled            = false
cookies_path       = ''                # optional Netscape cookies.txt
yt_dlp_path        = ''                # blank = `yt-dlp` on PATH
ffmpeg_path        = ''                # blank = `ffmpeg`  on PATH
default_playlist   = ""

[airplay]
# Turns the PC into an AirPlay speaker so a phone (e.g. Apple Music) can stream
# to it. Needs an external AirPlay receiver: shairport-sync with `-o stdout`,
# plus Apple Bonjour for network discovery, and ffmpeg to resample its output.
enabled            = false
receiver_path      = ''                # blank = `shairport-sync` on PATH
ffmpeg_path        = ''                # blank = `ffmpeg` on PATH
service_name       = "FH6 Radio"       # name shown in the phone's AirPlay picker
input_sample_rate  = 44100             # PCM rate the receiver emits

[audio]
output_gain = 1.0
