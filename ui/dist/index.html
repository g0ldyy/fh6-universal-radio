<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FH6 Universal Radio</title>

    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <div class="brand">
            <span class="mark" id="brand-mark" aria-hidden="true"></span>
            <div>
                <h1 data-i18n="brand.title">FH6 Universal Radio</h1>
                <span class="status" id="status" data-i18n="status.connecting">Connecting&hellip;</span>
            </div>
        </div>
        <button class="icon-btn" id="open-settings" aria-label="Settings" data-i18n-aria-label="settings.open"></button>
    </header>

    <section class="hero" id="np-art">
        <div class="hero-backdrop" id="np-backdrop" aria-hidden="true"></div>
        <div class="hero-inner">
            <div class="cover" aria-hidden="true"><img id="np-art-img" alt="" /></div>
            <div class="now-title" id="np-title" data-i18n="np.nothing_playing">Nothing playing</div>
            <div class="now-artist" id="np-artist"></div>
            <div class="progress">
                <div class="bar">
                    <div class="bar-fill" id="np-fill"></div>
                </div>
                <div class="times"><span id="np-pos">0:00</span><span id="np-dur">0:00</span></div>
            </div>
            <div class="transport">
                <button class="icon-btn" id="t-prev" aria-label="Previous" data-i18n-aria-label="np.previous"></button>
                <button class="icon-btn primary" id="t-play" aria-label="Play" data-i18n-aria-label="np.play"></button>
                <button class="icon-btn" id="t-next" aria-label="Next" data-i18n-aria-label="np.next"></button>
            </div>
        </div>
    </section>

    <main>
        <section class="card" id="source-card" hidden>
            <h2 data-i18n="source.title">Source</h2>
            <div class="sources" id="sources"></div>
        </section>

        <section class="card" id="output-card" hidden>
            <h2>Output</h2>
            <label class="slider">
                <span>Volume</span>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="1" />
                <output id="vol-out">100%</output>
            </label>
        </section>
    </main>

    <footer class="credits">
        <p class="credit-line">
            <strong>FH6 Universal Radio</strong> &mdash; an open-source mod by
            <a href="https://github.com/g0ldyy" target="_blank" rel="noopener noreferrer">g0ldyy</a>
            and
            <a href="https://github.com/g0ldyy/fh6-universal-radio/graphs/contributors" target="_blank"
                rel="noopener noreferrer">contributors</a>. Released under
            <a href="https://github.com/g0ldyy/fh6-universal-radio/blob/main/LICENSE" target="_blank"
                rel="noopener noreferrer">GPLv3</a>.
        </p>
        <p class="donate-line" data-i18n="credits.support_text">If this mod makes your drives better, consider
            supporting development:</p>
        <div class="donate-links">
            <a class="donate-btn" href="https://github.com/sponsors/g0ldyy" target="_blank"
                rel="noopener noreferrer"><span aria-hidden="true">&hearts;</span> GitHub Sponsors</a>
            <a class="donate-btn" href="https://ko-fi.com/g0ldyy" target="_blank" rel="noopener noreferrer"><span
                    aria-hidden="true">&#9749;</span> Ko-fi</a>
            <a class="donate-btn" href="https://github.com/g0ldyy/fh6-universal-radio" target="_blank"
                rel="noopener noreferrer"><span aria-hidden="true">&#9733;</span> Star the repo</a>
        </div>
    </footer>

    <aside class="drawer" id="drawer" inert aria-label="Settings">
        <div class="drawer-head">
            <h2 data-i18n="settings.open">Settings</h2>
            <button class="icon-btn" id="close-settings" aria-label="Close settings"
                data-i18n-aria-label="settings.close"></button>
        </div>
        <form id="settings-form" class="drawer-body"></form>
        <div class="drawer-foot">
            <div class="drawer-foot-group">
                <button class="btn ghost" id="backup-config" type="button" data-i18n="settings.backup"
                    data-i18n-title="settings.backup_title">Backup</button>
                <button class="btn ghost" id="restore-config" type="button" data-i18n="settings.restore"
                    data-i18n-title="settings.restore_title">Restore</button>
                <input type="file" id="restore-file" accept=".json" hidden />
            </div>

            <div class="drawer-foot-group">
                <button class="btn ghost" id="reload-config" type="button" data-i18n="settings.reload"
                    data-i18n-title="settings.reload_title">Reload</button>
                <button class="btn filled" id="save-config" type="button" data-i18n="settings.save">Save</button>
            </div>
        </div>
    </aside>
    <div class="scrim" id="scrim" hidden></div>

    <script src="js/main.js" type="module"></script>
</body>

</html>
